spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${STORE_DATA_DIR:./data}/store_appointment;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:sql/portable_schema.sql
      data-locations: classpath:sql/portable_data.sql
      continue-on-error: true
