sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: ${STORE_DB_HOST:localhost}
    port: ${STORE_DB_PORT:3306}
    database: ${STORE_DB_DATABASE:store_appointment}
    username: ${STORE_DB_USERNAME:root}
    password: ${STORE_DB_PASSWORD:12345678}
  jwt:
    admin-secret-key: ${STORE_JWT_ADMIN_SECRET_KEY:itcast}
    admin-ttl: ${STORE_JWT_ADMIN_TTL:7200000}
    admin-token-name: ${STORE_JWT_ADMIN_TOKEN_NAME:token}
    user-secret-key: ${STORE_JWT_USER_SECRET_KEY:itheima}
    user-ttl: ${STORE_JWT_USER_TTL:7200000}
    user-token-name: ${STORE_JWT_USER_TOKEN_NAME:authentication}
  alioss:
    endpoint: ${ALI_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${ALI_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALI_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${ALI_OSS_BUCKET_NAME:}
  wechat:
    appid: ${STORE_WECHAT_APPID:}
    secret: ${STORE_WECHAT_SECRET:}
    mchid: ${STORE_WECHAT_MCHID:}
    mch-serial-no: ${STORE_WECHAT_MCH_SERIAL_NO:}
    private-key-file-path: ${STORE_WECHAT_PRIVATE_KEY_FILE_PATH:}
    api-v3-key: ${STORE_WECHAT_API_V3_KEY:}
    we-chat-pay-cert-file-path: ${STORE_WECHAT_PAY_CERT_FILE_PATH:}
    notify-url: ${STORE_WECHAT_NOTIFY_URL:}
    refund-notify-url: ${STORE_WECHAT_REFUND_NOTIFY_URL:}

store:
  demo:
    read-only: ${STORE_DEMO_READ_ONLY:false}
